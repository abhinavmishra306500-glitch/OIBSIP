<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Calculator</title>

<style>
/* BACKGROUND */
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background:linear-gradient(-45deg,#0f172a,#1e3a8a,#7c3aed,#0f172a);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* CALCULATOR BOX */
.calculator{
    width:320px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    box-shadow:0 0 30px rgba(0,0,0,0.4);
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

/* DISPLAY */
#display{
    grid-column:span 4;
    height:70px;
    font-size:28px;
    text-align:right;
    padding:10px;
    border:none;
    border-radius:12px;
    background:rgba(0,0,0,0.4);
    color:#00ffcc;
    outline:none;
    box-shadow:inset 0 0 10px rgba(0,255,204,0.2);
}

/* BUTTONS */
button{
    height:60px;
    border:none;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
    color:white;
    background:rgba(255,255,255,0.1);
}

/* NUMBER BUTTONS */
button:not(.op):not(.eq):not(.clear):not(.del){
    background:rgba(255,255,255,0.12);
}

/* OPERATOR BUTTONS */
.op{
    background:linear-gradient(135deg,#f97316,#ef4444);
}

/* EQUAL BUTTON */
.eq{
    background:linear-gradient(135deg,#22c55e,#16a34a);
    grid-column:span 2;
}

/* CLEAR BUTTON */
.clear{
    background:linear-gradient(135deg,#ef4444,#b91c1c);
}

/* DELETE */
.del{
    background:linear-gradient(135deg,#facc15,#eab308);
}

/* HOVER EFFECT */
button:hover{
    transform:scale(1.05);
    filter:brightness(1.2);
}

/* CLICK EFFECT */
button:active{
    transform:scale(0.95);
}
</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" readonly>

<!-- ROW 1 -->
<button class="clear" onclick="clearDisplay()">C</button>
<button class="op" onclick="append('/')">/</button>
<button class="op" onclick="append('*')">*</button>
<button class="del" onclick="del()">⌫</button>

<!-- ROW 2 -->
<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button class="op" onclick="append('-')">-</button>

<!-- ROW 3 -->
<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button class="op" onclick="append('+')">+</button>

<!-- ROW 4 -->
<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button class="eq" onclick="calc()">=</button>

<!-- ROW 5 -->
<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>

</div>

<script>

let display=document.getElementById("display");

function append(val){
    display.value+=val;
}

function clearDisplay(){
    display.value="";
}

function del(){
    display.value=display.value.slice(0,-1);
}

function calc(){
    try{
        display.value=eval(display.value);
    }catch{
        display.value="Error";
    }
}

/* KEYBOARD SUPPORT */
document.addEventListener("keydown",(e)=>{
    if(!isNaN(e.key) || "+-*/.".includes(e.key)){
        append(e.key);
    }
    if(e.key==="Enter") calc();
    if(e.key==="Backspace") del();
    if(e.key==="Escape") clearDisplay();
});
</script>

</body>
</html>
