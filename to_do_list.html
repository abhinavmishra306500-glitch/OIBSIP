<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌈 Dream Planner Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(
        -45deg,
        #ff6b6b,
        #ff9f43,
        #48dbfb,
        #5f27cd,
        #00d2d3,
        #ff6b81
    );
    background-size:400% 400%;
    animation:gradientBG 15s ease infinite;
    position:relative;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.12);
    pointer-events:none;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Floating Shapes */
.shape{
    position:absolute;
    border-radius:50%;
    animation:float 15s infinite linear;
    opacity:.25;
}

.shape:nth-child(1){
    width:220px;
    height:220px;
    background:#fff;
    top:10%;
    left:5%;
}

.shape:nth-child(2){
    width:150px;
    height:150px;
    background:#ffe66d;
    top:20%;
    right:10%;
}

.shape:nth-child(3){
    width:280px;
    height:280px;
    background:#00d2d3;
    bottom:-50px;
    left:10%;
}

.shape:nth-child(4){
    width:180px;
    height:180px;
    background:#ff9ff3;
    bottom:5%;
    right:10%;
}

@keyframes float{
    from{
        transform:translateY(0px) rotate(0deg);
    }
    to{
        transform:translateY(-80px) rotate(360deg);
    }
}

/* Main App Card */
.container{
    width:700px;
    max-width:95%;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.4);
    border-radius:30px;
    padding:30px;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
    z-index:100;
}

/* Header */
.banner{
    text-align:center;
}

.banner img{
    width:150px;
    margin-bottom:10px;
    filter:drop-shadow(0 10px 20px rgba(0,0,0,.2));
}

h1{
    color:#0f172a;
    font-size:2.4rem;
    margin-bottom:20px;
    font-weight:700;
}

/* Input */
.input-area{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:15px;
    outline:none;
    background:white;
    color:#111827;
    font-size:16px;
    font-weight:500;
}

.add-btn{
    border:none;
    padding:15px 22px;
    border-radius:15px;
    cursor:pointer;
    font-weight:700;
    color:white;
    background:linear-gradient(45deg,#00c853,#00b0ff);
    transition:.3s;
}

.add-btn:hover{
    transform:scale(1.05);
}

/* Tabs */
.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.tab{
    flex:1;
    border:none;
    padding:12px;
    border-radius:15px;
    cursor:pointer;
    font-weight:600;
    transition:.3s;
}

.all{
    background:#2563eb;
    color:white;
}

.active{
    background:#f59e0b;
    color:#111827;
}

.completed{
    background:#7c3aed;
    color:white;
}

.active-tab{
    transform:scale(1.05);
    box-shadow:0 0 20px rgba(255,255,255,.6);
}

/* Task List */
ul{
    list-style:none;
}

li{
    background:rgba(255,255,255,.85);
    backdrop-filter:blur(10px);
    border-radius:15px;
    padding:15px;
    margin-bottom:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:#111827;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    transition:.3s;
}

li:hover{
    transform:translateX(8px);
    background:rgba(255,255,255,.97);
}

.task-left{
    display:flex;
    align-items:center;
    gap:12px;
}

.completed-task{
    text-decoration:line-through;
    opacity:.6;
}

.delete-btn{
    border:none;
    background:#ef4444;
    color:white;
    padding:8px 12px;
    border-radius:10px;
    cursor:pointer;
}

.delete-btn:hover{
    background:#dc2626;
}

/* Footer */
.footer{
    text-align:center;
    margin-top:15px;
    color:#0f172a;
    font-weight:700;
    font-size:18px;
}
</style>
</head>

<body>

<div class="shape"></div>
<div class="shape"></div>
<div class="shape"></div>
<div class="shape"></div>

<div class="container">

    <div class="banner">
        <img src="https://cdn-icons-png.flaticon.com/512/3281/3281289.png" alt="Planner">
        <h1>✨ Dream Planner ✨</h1>
    </div>

    <div class="input-area">
        <input type="text" id="taskInput" placeholder="What's your next goal?">
        <button class="add-btn" onclick="addTask()">➕ Add</button>
    </div>

    <div class="tabs">
        <button class="tab all active-tab" onclick="filterTasks('all',this)">🌍 All</button>
        <button class="tab active" onclick="filterTasks('active',this)">🔥 Active</button>
        <button class="tab completed" onclick="filterTasks('completed',this)">✅ Done</button>
    </div>

    <ul id="taskList"></ul>

    <div class="footer">
        🎯 Total Tasks: <span id="count">0</span>
    </div>

</div>

<script>
let tasks = [];
let currentFilter = "all";

function addTask() {
    const input = document.getElementById("taskInput");

    if (input.value.trim() === "") return;

    tasks.push({
        text: input.value,
        completed: false
    });

    input.value = "";
    renderTasks();
}

function toggleTask(index){
    tasks[index].completed = !tasks[index].completed;
    renderTasks();
}

function deleteTask(index){
    tasks.splice(index,1);
    renderTasks();
}

function filterTasks(filter, btn){
    currentFilter = filter;

    document.querySelectorAll(".tab")
        .forEach(tab => tab.classList.remove("active-tab"));

    btn.classList.add("active-tab");

    renderTasks();
}

function renderTasks(){

    const list = document.getElementById("taskList");
    list.innerHTML = "";

    let filtered = tasks.filter(task => {
        if(currentFilter === "active") return !task.completed;
        if(currentFilter === "completed") return task.completed;
        return true;
    });

    filtered.forEach(task => {

        const index = tasks.indexOf(task);

        list.innerHTML += `
        <li>
            <div class="task-left">
                <input
                    type="checkbox"
                    ${task.completed ? "checked" : ""}
                    onchange="toggleTask(${index})"
                    style="width:18px;height:18px;">
                    
                <span class="${task.completed ? "completed-task" : ""}">
                    ${task.text}
                </span>
            </div>

            <button class="delete-btn"
                onclick="deleteTask(${index})">
                🗑 Delete
            </button>
        </li>`;
    });

    document.getElementById("count").innerText = tasks.length;
}

renderTasks();
</script>

</body>
</html>
